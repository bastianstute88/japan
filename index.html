<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Japan 2027</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Japan 2027">
<meta name="theme-color" content="#000000">
<style>
  :root{ --red:#BC002D; }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{min-height:100%;background:#000;color:#fff;
    font-family:-apple-system,'SF Pro Display','Helvetica Neue',Arial,sans-serif}
  .wrap{max-width:640px;margin:0 auto;padding:64px 22px 48px;
    min-height:100vh;display:flex;flex-direction:column;justify-content:center}
  h1{font-size:40px;font-weight:800;text-align:center;letter-spacing:.5px}
  .date{text-align:center;color:#fff;opacity:.85;margin-top:10px;font-size:15px;
    letter-spacing:.3px}
  .hr{height:1px;background:var(--red);opacity:.7;margin:34px auto;width:70%}
  a.card{display:flex;align-items:center;gap:14px;text-decoration:none;color:#fff;
    background:#0a0a0a;border:1px solid rgba(255,255,255,.10);
    border-left:4px solid var(--red);border-radius:16px;
    padding:22px 20px;margin:0 auto;max-width:420px;width:100%;
    transition:background .15s}
  a.card:active{background:#141414}
  .card .emo{font-size:30px;line-height:1}
  .card .lbl{font-size:19px;font-weight:700;flex:1}
  .card .arr{font-size:22px;color:var(--red);font-weight:700}
  .foot{text-align:center;margin-top:40px;font-size:15px;color:#fff;opacity:.9;
    letter-spacing:1px}
</style>
</head>
<body>
  <div class="wrap">
    <h1>🇯🇵 Japan 🇯🇵</h1>
    <div class="date">20. Okt – 14. Nov 2027</div>
    <div class="hr"></div>
    <a class="card" href="Japan_2027.html">
      <span class="emo">📅</span>
      <span class="lbl">Reiseplan öffnen</span>
      <span class="arr">›</span>
    </a>
    <div class="foot">よい旅を！</div>
  </div>
</body>
</html>
